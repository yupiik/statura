# HELP: Target namespace name
# namespace.name = 

# HELP: Container registry URL/key
# registry.key = 

# HELP: Container registry password
# registry.password = 

# HELP: Container registry username
# registry.username = 

# HELP: Pod affinity/anti-affinity rules
# statura.affinity = {

# HELP: Default annotations for all resources
# statura.annotations = {} 

# HELP: ConfigMap annotations
# statura.configmap.annotations = {} 

# HELP: ConfigMap labels
# statura.configmap.labels = {"app.kubernetes.io/name":"statura"} 

# HELP: ConfigMap name
# statura.configmap.name = statura

# HELP: Monitor configuration (`data`) JSON content (checks, OTEL endpoint, timeouts)
# statura.configuration.content = 

# HELP: Container-level security context
# statura.containerSecurityContext = {

# HELP: CronJob resource annotations
# statura.cronjob.annotations = {} 

# HELP: Number of retries before marking a job as failed
# statura.cronjob.backoffLimit = 2

# HELP: Concurrency policy (Allow, Forbid, Replace)
# statura.cronjob.concurrencyPolicy = Forbid

# HELP: Number of failed finished jobs to retain
# statura.cronjob.failedJobsHistoryLimit = 1

# HELP: Image pull secrets for the pod
# statura.cronjob.imagePullSecrets = []

# HELP: CronJob resource labels
# statura.cronjob.labels = {"app.kubernetes.io/name":"statura"} 

# HELP: CronJob name
# statura.cronjob.name = statura

# HELP: Pod template annotations
# statura.cronjob.podAnnotations = {} 

# HELP: Pod template labels
# statura.cronjob.podLabels = {"app.kubernetes.io/name":"statura"} 

# HELP: Pod restart policy (OnFailure, Never)
# statura.cronjob.restartPolicy = OnFailure

# HELP: Cron schedule expression (standard cron format)
# statura.cronjob.schedule = */5 * * * *

# HELP: Deadline for starting a job if it misses its scheduled time
# statura.cronjob.startingDeadlineSeconds = 120

# HELP: Number of successful finished jobs to retain
# statura.cronjob.successfulJobsHistoryLimit = 3

# HELP: TTL for cleaning up finished jobs
# statura.cronjob.ttlSecondsAfterFinished = 300

# HELP: Image pull policy
# statura.image.pullPolicy = IfNotPresent

# HELP: Container image repository
# statura.image.repository = statura

# HELP: Container image tag
# statura.image.tag = 1.0-SNAPSHOT

# HELP: Default labels for all resources
# statura.labels = {} 

# HELP: Application name
# statura.name = statura

# HELP: Target Kubernetes namespace
# statura.namespace = statura

# HELP: Node selector for scheduling
# statura.nodeSelector = {

# HELP: Pod-level security context
# statura.podSecurityContext = {

# HELP: Container resource requests and limits
# statura.resources = {

# HELP: Secret annotations
# statura.secret.annotations = {} 

# HELP: Content (`data`) of the secret - mainly for passwords/API keys etc... Note that you cna use bundlebee base64 function to format it as expected by kubernetes.
# statura.secret.content = 

# HELP: Secret labels
# statura.secret.labels = {"app.kubernetes.io/name":"statura"} 

# HELP: Where to mount the secret in the `Pod`. It is unlikely it needs to be changed.
# statura.secret.mount = /opt/statura/secrets

# HELP: Secret name
# statura.secret.name = statura

# HELP: ServiceAccount annotations
# statura.serviceAccount.annotations = {} 

# HELP: Whether to automount the service account token
# statura.serviceAccount.automount = false

# HELP: ServiceAccount labels
# statura.serviceAccount.labels = {"app.kubernetes.io/name":"statura"} 

# HELP: ServiceAccount name
# statura.serviceAccount.name = statura

# HELP: Size limit for the emptyDir tmp volume
# statura.tmp.size = 8Mi

# HELP: Pod tolerations
# statura.tolerations = []
