statura.name = Application name
statura.namespace = Target Kubernetes namespace

statura.serviceAccount.name = ServiceAccount name
statura.serviceAccount.automount = Whether to automount the service account token
statura.serviceAccount.labels = ServiceAccount labels
statura.serviceAccount.annotations = ServiceAccount annotations

statura.secret.name = Secret name
statura.secret.labels = Secret labels
statura.secret.annotations = Secret annotations
statura.secret.content = Content (`data`) of the secret - mainly for passwords/API keys etc... Note that you cna use bundlebee base64 function to format it as expected by kubernetes.
statura.secret.mount = Where to mount the secret in the `Pod`. It is unlikely it needs to be changed.

statura.configmap.name = ConfigMap name
statura.configmap.labels = ConfigMap labels
statura.configmap.annotations = ConfigMap annotations
statura.configuration.content = Monitor configuration (`data`) JSON content (checks, OTEL endpoint, timeouts)

statura.cronjob.name = CronJob name
statura.cronjob.schedule = Cron schedule expression (standard cron format)
statura.cronjob.startingDeadlineSeconds = Deadline for starting a job if it misses its scheduled time
statura.cronjob.concurrencyPolicy = Concurrency policy (Allow, Forbid, Replace)
statura.cronjob.successfulJobsHistoryLimit = Number of successful finished jobs to retain
statura.cronjob.failedJobsHistoryLimit = Number of failed finished jobs to retain
statura.cronjob.backoffLimit = Number of retries before marking a job as failed
statura.cronjob.ttlSecondsAfterFinished = TTL for cleaning up finished jobs
statura.cronjob.restartPolicy = Pod restart policy (OnFailure, Never)
statura.cronjob.labels = CronJob resource labels
statura.cronjob.annotations = CronJob resource annotations
statura.cronjob.podLabels = Pod template labels
statura.cronjob.podAnnotations = Pod template annotations
statura.cronjob.imagePullSecrets = Image pull secrets for the pod

statura.image.repository = Container image repository
statura.image.tag = Container image tag
statura.image.pullPolicy = Image pull policy

statura.podSecurityContext = Pod-level security context
statura.containerSecurityContext = Container-level security context

statura.resources = Container resource requests and limits
statura.tmp.size = Size limit for the emptyDir tmp volume

statura.nodeSelector = Node selector for scheduling
statura.affinity = Pod affinity/anti-affinity rules
statura.tolerations = Pod tolerations

statura.labels = Default labels for all resources
statura.annotations = Default annotations for all resources

# namespace templates
namespace.name = Target namespace name
registry.key = Container registry URL/key
registry.username = Container registry username
registry.password = Container registry password
